<!DOCTYPE html>
<html>
<head>
    <title>Parent Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h2>📊 Parent Dashboard</h2>

    <form method="post">
        <input type="text" name="site" placeholder="Add Allowed Website (https://example.com)" required>
        <button type="submit">Add Website</button>
    </form>

    <div class="table-box">
        <h3>📝 Activity Logs</h3>
        <table>
            <tr>
                <th>User</th>
                <th>Activity</th>
                <th>Time</th>
            </tr>
            {% for log in logs %}
            <tr>
                <td>{{ log[0] }}</td>
                <td>{{ log[2] }}</td>
                <td>{{ log[3] }}</td>
            </tr>
            {% endfor %}
        </table>
    </div>
</div>
<hr>

<h3>⏱ Set Child Time Limit</h3>

<form method="post">
    <input type="number" name="minutes"
           placeholder="Time limit (minutes)" required>
    <button type="submit">Save Time Limit</button>
</form>

<p><b>Current Time Limit:</b> {{ limit }} minutes</p>


</body>
</html>
